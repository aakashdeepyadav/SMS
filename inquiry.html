<div class="form" id="inqform">
   
  <form action="" method="post">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>
    <label for="rgid">Registration No.:</label>
    <input type="text" id="rgid" name="rgid" maxlength="8" required>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
    <br>
    <label for="course">Course:</label>
    <select id="course" name="course">
        <option value="CSE">CSE</option >
        <option value="ECE">ECE</option>
        <option value="ML">Civil</option>
        <option value="ML">Chemical</option>
        <option value="ML">IT</option>
        <option value="ML">Mechanical</option>
        <option value="ML">Aerospace</option>
        
    </select>
    <br>
    <label for="message">Message:</label>
    
    <textarea id="message" name="message" rows="4" cols="79" placeholder="Write your query here..." required></textarea>
    <br>
    <center><button type="submit">Submit Inquiry</button></center>
</form>




<script>
  var form = document.getElementById("inqform");
  form.addEventListener("submit", function(event) {
      event.preventDefault();
      alert("Your query has been forwarded to the concern authority !");
      window.location.href="sms.html";
  });
</script>

</div>
